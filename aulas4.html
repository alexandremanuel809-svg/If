<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colégio Árvore da Felicidade (CAF)</title>
</head>
<style>
     *{font-family:Times new roman;color: blue;padding:100;margin:5;}
    body{background:linear-gradient(to right,green,yellow);}
    .alexandre{
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    h1{text-align:center;font-size:30px;animation: onda 2s infinite;}
    @keyframes onda{
        0%{
            transform: scale(1);
        }
        50%{
            transform: scale(1.2);
        }
        100%{
            transform: scale(1);
        }
    }
</style>
<body>
    <div class="alexandre">
     <img src="imagem22.png" width="200px" height="200px">
     <h1>Matricula feita !</h1>
     </div>
</body>
</html>
