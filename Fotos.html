<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Obah</title>
    <style>
      .carousel {
  position: relative;
  width: 500px;
  height: 300px;
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.botao-esquerda, .botao-direita {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background-color: #fff;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.botao-esquerda {
  left: 0;
}

.botao-direita {
  right: 0;
}
    </style>
  </head>
  <body>
    <div class="carousel">
  <img id="imagem" src="imagem1.jpg" alt="Imagem 1">
  <button id="anterior" class="botao-esquerda">⬅️</button>
  <button id="proximo" class="botao-direita">➡️</button>
</div>
<script>
  const imagens = ['imagem1.jpg', 'imagem2.png', 'imagem3.png'];
let indiceAtual = 0;

const imagem = document.getElementById('imagem');
const anterior = document.getElementById('anterior');
const proximo = document.getElementById('proximo');

proximo.addEventListener('click', () => {
  indiceAtual = (indiceAtual + 1) % imagens.length;
  imagem.src = imagens[indiceAtual];
});

anterior.addEventListener('click', () => {
  indiceAtual = (indiceAtual - 1 + imagens.length) % imagens.length;
  imagem.src = imagens[indiceAtual];
});
</script>
  </body>
</html>
