<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: linear-gradient(to right,blue,white,yellow,lime);animation: moverCores 5s ease infinite
        }
        @keyframes moverCores{
            0%{
                background-position: 0% 50%;
            }
            50%{
                background-position: 100% 50%;
            }
            100%{
                background-position: 0% 50%;
            }
        }
        h1{
            text-align: center;font-size: 30px;color: red;animation: fadein 1s ease infinite;
        }
        @keyframes fadein{
            to{opacity: 1;}
            from{opacity: 0;}
        }
        h2{
            text-align: center;color: red;animation: onda 2s infinite;
        }
        @keyframes onda{
            0%{
                transform: scale(1);            
        }
        50%{
            transform: scale(1.3);
        }
        100%{
            transform: scale(1);
        }
    </style>
</head>
<body>
    <h1>Olá</h1>
    <h2>Como estão</h2>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sit pariatur enim, adipisci sapiente numquam quod placeat itaque ipsum eos? Nostrum aliquid quaerat sapiente odit sequi fugiat quam illo totam dolore.</p>
</body>
</html>
